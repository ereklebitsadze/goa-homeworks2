<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
</head>
<body>
    <style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eaeded;
}


.navbar {
    background: #131921;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px 20px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #ff9900;
    margin-right: 20px;
}

.search-box {
    flex: 1;
    display: flex;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
}

.search-box button {
    padding: 10px 15px;
    background: #febd69;
    border: none;
}

.nav-links {
    display: flex;
    gap: 15px;
    margin-left: 20px;
}


.hero {
    background: url("https://images.unsplash.com/photo-1512436991641-6745cdb1723f") center/cover;
    height: 300px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
}

.hero-text {
    background: white;
    padding: 10px 20px;
    margin-bottom: 20px;
    font-weight: bold;
}

.products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 30px;
}

.product-card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    transition: 0.3s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.product-card {
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.product-card img {
    width: 100%;
    height: 180px;
}

.product-card h3 {
    font-size: 16px;
    margin: 10px 0 5px;
}

.price {
    color: #B12704;
    font-weight: bold;
}

.product-card button {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    border: none;
    background: #ffd814;
    border-radius: 4px;
}

.product-card button:hover {
    background: #f7ca00;
}


.footer {
    background: #232f3e;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">amazon</div>

    <div class="search-box">
        <input type="text" placeholder="Search Amazon">
        <button>Search</button>
    </div>

    <div class="nav-links">
        <div>Account</div>
        <div>Orders</div>
        <div>Cart 🛒</div>
    </div>
</div>


<div class="hero">
    <div class="hero-text">
        Welcome to Amazon Clone - Shop the best deals!
    </div>
</div>


<div class="products">

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3">
        <h3>Gaming Mouse</h3>
        <div class="price">$29.99</div>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
        <h3>Mechanical Keyboard</h3>
        <div class="price">$59.99</div>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://tse3.mm.bing.net/th/id/OIP.4fswjjkRtP2qLaF4E6OVRQHaHa?cb=defcachec2&rs=1&pid=ImgDetMain&o=7&rm=3">
        <h3>Wireless Headphones</h3>
        <div class="price">$39.99</div>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1527443154391-507e9dc6c5cc">
        <h3>Gaming Monitor</h3>
        <div class="price">$199.99</div>
        <button>Add to Cart</button>
    </div>

</div>


<div class="footer">
    © 2026 Amazon
</div>

</body>
</html>
