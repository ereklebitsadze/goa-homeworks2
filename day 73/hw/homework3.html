<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>2D Car</title>
<style>
  body { margin:0; background:#cce; overflow:hidden; }
  .road { position:absolute; bottom:0; width:100%; height:100px; background:#444; }
  .car { position:absolute; bottom:100px; width:120px; animation:drive 5s linear infinite; }
  @keyframes drive {
    0% { left:-150px; }
    100% { left:100%; }
  }
</style>
</head>
<body>
  <div class="road"></div>
  <img src="https://via.placeholder.com/120x60?text=Car" class="car">
</body>
</html>
