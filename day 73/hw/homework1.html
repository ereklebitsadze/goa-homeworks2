<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Flying Turtle</title>
<style>
  body { margin:0; background:skyblue; overflow:hidden; }
  .mountain { position:absolute; bottom:0; width:100%; height:200px; background:linear-gradient(#555,#333); }
  .turtle { position:absolute; width:100px; animation:fly 10s linear infinite; }
  @keyframes fly {
    0% { left:-120px; top:100px; }
    50% { left:50%; top:50px; }
    100% { left:100%; top:120px; }
  }
</style>
</head>
<body>
  <div class="mountain"></div>
  <img src="https://via.placeholder.com/100x60?text=Turtle" class="turtle">
</body>
</html>
