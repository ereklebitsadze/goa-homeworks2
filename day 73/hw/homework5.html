<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Running Horse</title>
<style>
  body { margin:0; background:#eee; overflow:hidden; }
  .horse { position:absolute; width:100px; animation:run 6s linear infinite; }
  @keyframes run {
    0% { left:20px; top:200px; transform:scale(1); }
    50% { left:50%; top:100px; transform:scale(2); }
    100% { left:80%; top:50px; transform:scale(3); }
  }
</style>
</head>
<body>
  <img src="https://via.placeholder.com/100x80?text=Horse" class="horse">
</body>
</html>
